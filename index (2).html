<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test de Wepman Virtual</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .item { margin-bottom: 10px; padding: 10px; border-bottom: 1px solid #eee; }
        .hidden { display: none; }
        button { background: #4CAF50; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card" id="form-container">
    <h2>Registro del Niño</h2>
    <input type="text" id="dni" placeholder="DNI" required><br><br>
    <input type="text" id="nombre" placeholder="Nombre completo" size="30" required><br><br>
    <label>Edad:</label>
    <select id="edad_cron">
        <option value="3">3 años</option>
        <option value="4">4 años</option>
        <option value="5">5 años</option>
    </select>
    <hr>
    <h3>Instrucciones</h3>
    <p>Se dirán los pares de palabras. Marque "Igual" o "Diferente" según responda el niño.</p>
    
    <div id="test-items">
        <!-- Los 40 items se generan aquí -->
    </div>

    <button type="button" onclick="procesarResultados()">Enviar a Google Sheets</button>
</div>

<script>
const palabras = [
    ["SOBA", "SOGA"], ["LANA", "LANA"], ["DEDO", "DEBO"], ["RUEGA", "RUEDA"], ["CHAL", "CHAL"],
    ["GUÍA", "DÍA"], ["BOL", "GOL"], ["SIN", "FIN"], ["PERRO", "BERRO"], ["SACO", "SACO"],
    ["ZONA", "ZONA"], ["JARRO", "JARRO"], ["CASA", "GASA"], ["ECO", "ECO"], ["BRAMA", "TRAMA"],
    ["TIZA", "PIZA"], ["PITO", "PICO"], ["CANA", "CAMA"], ["CUBO", "TUBO"], ["FIEL", "PIEL"],
    ["MAPA", "MATA"], ["BEBE", "BEBE"], ["CARGO", "CARDO"], ["PARCO", "PARTO"], ["BULBO", "BULTO"],
    ["MIDO", "NIDO"], ["CLAN", "PLAN"], ["TIFÓN", "TIZÓN"], ["CRUZ", "CRUZ"], ["DIEZ", "DIEZ"],
    ["POBRE", "COBRE"], ["TROTE", "BROTE"], ["BRASA", "GRASA"], ["TORO", "TORO"], ["PAN", "PAN"],
    ["ARCÓN", "HALCÓN"], ["PLAN", "FLAN"], ["FLOR", "FLOR"], ["ROPA", "ROBA"], ["CRIO", "TRIO"]
];

const container = document.getElementById('test-items');

// Generar preguntas
palabras.forEach((par, index) => {
    const esIgual = par[0] === par[1];
    container.innerHTML += `
        <div class="item">
            <p>${index + 1}. <strong>${par[0]} - ${par[1]}</strong></p>
            <label><input type="radio" name="p${index}" value="${esIgual ? 'Y' : 'X'}"> Igual</label>
            <label><input type="radio" name="p${index}" value="${!esIgual ? 'Y' : 'X'}"> Diferente</label>
        </div>
    `;
});

function calcularEdadCorr(porcentaje) {
    if (porcentaje >= 91) return "5.7 - 6.0 años";
    if (porcentaje >= 81) return "5.1 - 5.6 años";
    if (porcentaje >= 71) return "4.7 - 5.0 años";
    if (porcentaje >= 61) return "4.1 - 4.6 años";
    if (porcentaje >= 51) return "3.7 - 4.0 años";
    if (porcentaje >= 41) return "3.0 - 3.6 años";
    return "Menos de 3.0 años";
}

function procesarResultados() {
    let aciertos = 0;
    palabras.forEach((_, i) => {
        const selected = document.querySelector(`input[name="p${i}"]:checked`);
        if (selected && selected.value === 'Y') aciertos++;
    });

    const porcentaje = (aciertos / 40) * 100;
    const edad_corr = calcularEdadCorr(porcentaje);
    
    const datos = {
        dni: document.getElementById('dni').value,
        nombre: document.getElementById('nombre').value,
        edad_cron: document.getElementById('edad_cron').value,
        porcentaje: porcentaje,
        edad_corr: edad_corr
    };

    // REEMPLAZA ESTA URL con la de tu implementación de Google Apps Script
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyAZPuQ8QxLtXAtGpF4hvWEuKrlCFWxgls8dC5VhSVAB31uINSJVknPD2ujWkVAxBauEQ/exec";

    fetch(URL_SCRIPT, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams(datos)
    }).then(() => {
        alert("Datos enviados con éxito.\nResultado: " + porcentaje + "%\nEdad: " + edad_corr);
    });
}
</script>

</body>
</html>
