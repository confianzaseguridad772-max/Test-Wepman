<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Wepman Virtual</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 30px; border-bottom: 2px solid #27ae60; padding-bottom: 10px; }
        
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; background: #f9f9f9; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #eee; }
        .info-grid label { font-weight: bold; display: block; margin-bottom: 8px; color: #555; }
        input[type="text"], select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .consigna { background: #fff8e1; border-left: 5px solid #ffc107; padding: 15px; margin-bottom: 25px; font-style: italic; border-radius: 4px; }
        
        .test-header { display: flex; font-weight: bold; background: #2c3e50; color: white; padding: 12px; border-radius: 5px 5px 0 0; margin-top: 20px; }
        .col-word { flex: 2; }
        .col-opt { flex: 1; text-align: center; }

        .item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; transition: background 0.2s; }
        .item:hover { background-color: #f1f8ff; }
        .item-word { flex: 2; font-weight: 600; font-size: 1.05em; }
        .item-options { flex: 1; display: flex; justify-content: space-around; }
        
        .btn-submit { display: block; width: 100%; padding: 20px; background-color: #27ae60; color: white; border: none; border-radius: 8px; font-size: 1.25em; font-weight: bold; cursor: pointer; margin-top: 40px; box-shadow: 0 4px 6px rgba(39, 174, 96, 0.3); }
        .btn-submit:hover { background-color: #219150; transform: translateY(-1px); }
        
        .footer-note { text-align: center; font-size: 0.85em; color: #888; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Test de Discriminación Auditiva (Wepman)</h1>
    
    <div class="info-grid">
        <div>
            <label>DNI del Niño:</label>
            <input type="text" id="dni" placeholder="Ej. 44021545" required>
        </div>
        <div>
            <label>Nombre del Niño:</label>
            <input type="text" id="nombre" placeholder="Nombre completo" required>
        </div>
        <div>
            <label>Edad Cronológica:</label>
            <select id="edad_cron">
                <option value="3">3 años</option>
                <option value="4">4 años</option>
                <option value="5">5 años</option>
            </select>
        </div>
    </div>

    <div class="consigna">
        <strong>Consigna:</strong> "Te voy a leer algunas palabras y tú me dirás si las oyes igual o diferente."
    </div>

    <div class="test-header">
        <div class="col-word">Par de Palabras</div>
        <div class="col-opt">Respuesta del Niño</div>
    </div>
    
    <div id="contenedor-test">
        <!-- Las palabras se cargarán aquí automáticamente -->
    </div>

    <button class="btn-submit" onclick="enviarResultados()">Finalizar y Registrar en Excel</button>
    
    <p class="footer-note">Asegúrese de que el niño no vea su boca durante la prueba.</p>
</div>

<script>
// Lista de los 40 ítems oficiales del PDF[cite: 1]
const itemsWepman = [
    ["SOBA", "SOGA"], ["LANA", "LANA"], ["DEDO", "DEBO"], ["RUEGA", "RUEDA"], ["CHAL", "CHAL"],
    ["GUÍA", "DÍA"], ["BOL", "GOL"], ["SIN", "FIN"], ["PERRO", "BERRO"], ["SACO", "SACO"],
    ["ZONA", "ZONA"], ["JARRO", "JARRO"], ["CASA", "GASA"], ["ECO", "ECO"], ["BRAMA", "TRAMA"],
    ["TIZA", "PIZA"], ["PITO", "PICO"], ["CANA", "CAMA"], ["CUBO", "TUBO"], ["FIEL", "PIEL"],
    ["MAPA", "MATA"], ["BEBE", "BEBE"], ["CARGO", "CARDO"], ["PARCO", "PARTO"], ["BULBO", "BULTO"],
    ["MIDO", "NIDO"], ["CLAN", "PLAN"], ["TIFÓN", "TIZÓN"], ["CRUZ", "CRUZ"], ["DIEZ", "DIEZ"],
    ["POBRE", "COBRE"], ["TROTE", "BROTE"], ["BRASA", "GRASA"], ["TORO", "TORO"], ["PAN", "PAN"],
    ["ARCÓN", "HALCÓN"], ["PLAN", "FLAN"], ["FLOR", "FLOR"], ["ROPA", "ROBA"], ["CRIO", "TRIO"]
];

const contenedor = document.getElementById('contenedor-test');

// Función para cargar la lista apenas abra la página
window.onload = function() {
    itemsWepman.forEach((par, i) => {
        const sonIguales = (par[0] === par[1]);
        contenedor.innerHTML += `
            <div class="item">
                <div class="item-word">${i + 1}. ${par[0]} - ${par[1]}</div>
                <div class="item-options">
                    <label><input type="radio" name="p${i}" value="${sonIguales ? '1' : '0'}"> Igual</label>
                    <label><input type="radio" name="p${i}" value="${!sonIguales ? '1' : '0'}"> Diferente</label>
                </div>
            </div>
        `;
    });
};

function enviarResultados() {
    let aciertos = 0;
    const total = 40;[cite: 1]

    for (let i = 0; i < total; i++) {
        const seleccion = document.querySelector(`input[name="p${i}"]:checked`);
        if (seleccion && seleccion.value === "1") aciertos++;
    }

    const porcentaje = (aciertos / total) * 100;[cite: 1]
    
    // Tabla de valoración del PDF[cite: 1]
    let edadCorr = "Menor a 3.0 años";
    if (porcentaje >= 91) edadCorr = "5.7 - 6.0 años";
    else if (porcentaje >= 81) edadCorr = "5.1 - 5.6 años";
    else if (porcentaje >= 71) edadCorr = "4.7 - 5.0 años";
    else if (porcentaje >= 61) edadCorr = "4.1 - 4.6 años";
    else if (porcentaje >= 51) edadCorr = "3.7 - 4.0 años";
    else if (porcentaje >= 41) edadCorr = "3.0 - 3.6 años";

    const payload = {
        dni: document.getElementById('dni').value,
        nombre: document.getElementById('nombre').value,
        edad_cron: document.getElementById('edad_cron').value,
        porcentaje: porcentaje.toFixed(1),
        edad_corr: edadCorr
    };

    if (!payload.dni || !payload.nombre) {
        alert("Por favor, complete los datos de identificación del niño.");
        return;
    }

    const scriptURL = 'https://script.google.com/macros/s/AKfycbyAZPuQ8QxLtXAtGpF4hvWEuKrlCFWxgls8dC5VhSVAB31uINSJVknPD2ujWkVAxBauEQ/exec';

    fetch(scriptURL, {
        method: 'POST',
        mode: 'no-cors',
        body: new URLSearchParams(payload)
    }).then(() => {
        alert("Test registrado con éxito.\nPorcentaje: " + porcentaje + "%\nEdad de desarrollo: " + edadCorr);
        location.reload();
    }).catch(e => alert("Error al enviar: " + e));
}
</script>

</body>
</html>
