<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Wepman Virtual</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; color: #333; line-height: 1.6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1, h2 { color: #2c3e50; text-align: center; }
        .info-section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; background: #eef2f7; padding: 20px; border-radius: 8px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; transition: background 0.2s; }
        .item:hover { background-color: #f9f9f9; }
        .words { font-weight: bold; font-size: 1.1em; color: #444; flex: 1; }
        .options { flex: 1; text-align: right; }
        .btn-submit { display: block; width: 100%; padding: 15px; background-color: #27ae60; color: white; border: none; border-radius: 8px; font-size: 1.2em; cursor: pointer; margin-top: 30px; }
        .btn-submit:hover { background-color: #219150; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; width: 90%; }
        .consigna { font-style: italic; background: #fff3cd; padding: 10px; border-left: 5px solid #ffecb5; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Test de Discriminación Auditiva (Wepman)</h1>
    
    <div class="info-section">
        <div>
            <label>DNI del Niño:</label><br>
            <input type="text" id="dni" required>
        </div>
        <div>
            <label>Nombre del Niño:</label><br>
            <input type="text" id="nombre" required>
        </div>
        <div>
            <label>Edad Cronológica:</label><br>
            <select id="edad_cron">
                <option value="3">3 años</option>
                <option value="4">4 años</option>
                <option value="5">5 años</option>
            </select>
        </div>
    </div>

    <div class="consigna">
        <strong>Consigna:</strong> "Te voy a leer algunas palabras y tú me dirás si las oyes igual o diferente."
    </div>

    <div id="test-content">
        <!-- Generado por JS -->
    </div>

    <button class="btn-submit" onclick="enviarDatos()">Finalizar y Enviar a Google Sheets</button>
</div>

<script>
// Listado oficial del PDF
const pares = [
    ["SOBA", "SOGA"], ["LANA", "LANA"], ["DEDO", "DEBO"], ["RUEGA", "RUEDA"], ["CHAL", "CHAL"],
    ["GUÍA", "DÍA"], ["BOL", "GOL"], ["SIN", "FIN"], ["PERRO", "BERRO"], ["SACO", "SACO"],
    ["ZONA", "ZONA"], ["JARRO", "JARRO"], ["CASA", "GASA"], ["ECO", "ECO"], ["BRAMA", "TRAMA"],
    ["TIZA", "PIZA"], ["PITO", "PICO"], ["CANA", "CAMA"], ["CUBO", "TUBO"], ["FIEL", "PIEL"],
    ["MAPA", "MATA"], ["BEBE", "BEBE"], ["CARGO", "CARDO"], ["PARCO", "PARTO"], ["BULBO", "BULTO"],
    ["MIDO", "NIDO"], ["CLAN", "PLAN"], ["TIFÓN", "TIZÓN"], ["CRUZ", "CRUZ"], ["DIEZ", "DIEZ"],
    ["POBRE", "COBRE"], ["TROTE", "BROTE"], ["BRASA", "GRASA"], ["TORO", "TORO"], ["PAN", "PAN"],
    ["ARCÓN", "HALCÓN"], ["PLAN", "FLAN"], ["FLOR", "FLOR"], ["ROPA", "ROBA"], ["CRIO", "TRIO"]
];

const testContainer = document.getElementById('test-content');

// Crear los 40 campos
pares.forEach((par, i) => {
    const esIgualReal = par[0] === par[1];
    testContainer.innerHTML += `
        <div class="item">
            <span class="words">${i + 1}. ${par[0]} - ${par[1]}</span>
            <div class="options">
                <label><input type="radio" name="r${i}" value="${esIgualReal ? '1' : '0'}"> Igual</label>
                <label><input type="radio" name="r${i}" value="${!esIgualReal ? '1' : '0'}"> Diferente</label>
            </div>
        </div>
    `;
});

function obtenerEdadCorrespondiente(p) {
    // Escala basada en la tabla del protocolo[cite: 1]
    if (p >= 91) return "5.7 - 6.0 años";
    if (p >= 81) return "5.1 - 5.6 años";
    if (p >= 71) return "4.7 - 5.0 años";
    if (p >= 61) return "4.1 - 4.6 años";
    if (p >= 51) return "3.7 - 4.0 años";
    if (p >= 41) return "3.0 - 3.6 años";
    return "Menor a 3.0 años";
}

function enviarDatos() {
    let aciertos = 0;
    const totalItems = 40;

    for (let i = 0; i < totalItems; i++) {
        const check = document.querySelector(`input[name="r${i}"]:checked`);
        if (check && check.value === "1") aciertos++;
    }

    const porcentaje = (aciertos / totalItems) * 100;[cite: 1]
    const edadCorr = obtenerEdadCorrespondiente(porcentaje);
    
    const payload = {
        dni: document.getElementById('dni').value,
        nombre: document.getElementById('nombre').value,
        edad_cron: document.getElementById('edad_cron').value,
        porcentaje: porcentaje.toFixed(1),
        edad_corr: edadCorr
    };

    if (!payload.dni || !payload.nombre) {
        alert("Por favor, completa los datos del niño.");
        return;
    }

    const scriptURL = 'https://script.google.com/macros/s/AKfycbyAZPuQ8QxLtXAtGpF4hvWEuKrlCFWxgls8dC5VhSVAB31uINSJVknPD2ujWkVAxBauEQ/exec';

    fetch(scriptURL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams(payload)
    })
    .then(() => {
        alert(`¡Test Enviado!\nResultado: ${porcentaje}%\nEdad Correspondiente: ${edadCorr}`);
        location.reload();
    })
    .catch(error => console.error('Error:', error));
}
</script>
</body>
</html>
